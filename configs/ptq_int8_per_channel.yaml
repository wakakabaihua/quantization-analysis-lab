name: int8_per_channel_sym
description: >
  INT8 per-channel symmetric quantization with MinMax calibration.
  Uses one scale/zero-point per output channel. Typically reduces
  quantization error for layers with large inter-channel weight variance.

quantization:
  enabled: true
  dtype: int8
  symmetric: true
  weight_only: false

calibration:
  method: minmax
  num_samples: 128
  percentile: null

granularity: per_channel

experiment:
  layers:
    - mlp
    - attention
  log_outputs: true
