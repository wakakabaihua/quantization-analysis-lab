name: int8_torch_ao_per_channel
description: >
  INT8 dynamic quantization via torch.ao.quantization.quantize_dynamic()
  with per-channel weight quantization (PerChannelMinMaxObserver).
  Per-channel weights allow a separate scale per output channel, reducing
  quantization error for layers with large inter-channel weight variance.

quantization:
  enabled: true
  dtype: int8
  symmetric: true
  weight_only: false

calibration:
  method: minmax
  num_samples: 128
  percentile: null

granularity: per_channel

backend: torch_ao

experiment:
  layers:
    - mlp
    - attention
  log_outputs: true
